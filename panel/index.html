<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JB AI Proxy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>JB AI Proxy</h1>
      <p class="subtitle">JetBrains AI 反向代理管理面板</p>
    </header>

    <section class="actions">
      <button class="btn btn-primary" onclick="startOAuth()">添加账号</button>
      <button class="btn btn-secondary" onclick="showManualForm()">手动导入</button>
    </section>

    <!-- OAuth 登录 -->
    <div id="oauth-form" class="card hidden">
      <h3>第一步：<a id="oauth-url" class="step-link" href="#" target="_blank">点击此处前往 JetBrains 登录</a></h3>
      <p class="step-hint">登录并授权后，浏览器会跳转到一个以 <code>http://localhost:...</code> 开头的地址。复制浏览器地址栏中的完整 URL。</p>

      <h3>第二步：填写回调 URL 和 License ID</h3>
      <form onsubmit="submitOAuthCallback(event)">
        <div class="form-group">
          <label>回调 URL</label>
          <input type="text" id="oauth-callback" required placeholder="http://localhost:3000/?code=xxx&state=xxx">
        </div>
        <div class="form-group">
          <label>License ID &mdash; 打开 <a href="https://account.jetbrains.com/licenses" target="_blank">account.jetbrains.com/licenses</a> 页面查看</label>
          <input type="text" id="oauth-license" required placeholder="ULJX59IS80">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">提交</button>
          <button type="button" class="btn btn-secondary" onclick="hideOAuthForm()">取消</button>
        </div>
      </form>
    </div>

    <!-- 手动导入 -->
    <div id="manual-form" class="card hidden">
      <h3>手动导入</h3>
      <form onsubmit="addManual(event)">
        <div class="form-group">
          <label>Refresh Token</label>
          <input type="text" id="manual-rt" required placeholder="uk0HfOcIf57KXgyd...">
        </div>
        <div class="form-group">
          <label>License ID</label>
          <input type="text" id="manual-lid" required placeholder="ULJX59IS80">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">添加</button>
          <button type="button" class="btn btn-secondary" onclick="hideManualForm()">取消</button>
        </div>
      </form>
    </div>

    <!-- 账号列表 -->
    <section class="card">
      <h2>账号列表 <button class="btn-sm" onclick="loadAccounts()">刷新</button></h2>
      <p id="accounts-summary" class="muted"></p>
      <div id="accounts-list">
        <p class="muted">加载中...</p>
      </div>
      <div id="accounts-pagination" class="pagination"></div>
    </section>

    <!-- 接口信息 -->
    <section class="card">
      <h2>接口地址</h2>
      <table class="endpoint-table">
        <tr><td><code>POST /v1/chat/completions</code></td><td>OpenAI 兼容</td></tr>
        <tr><td><code>POST /v1/messages</code></td><td>Anthropic 兼容</td></tr>
        <tr><td><code>GET /v1/models</code></td><td>模型列表</td></tr>
      </table>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
